<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="/ja/" class="logo">
        <img src="../../assets/image-assets/logo.png" alt="サヒルのノート" width="40" height="40">
        <div class="logo-text">
          <h1>サヒルのノート</h1>

      <nav class="nav">

  <!-- Main Content -->
  <main class="container py-4">
    <h1 class="text-center mb-3">プロフィール</h1>
    <div id="about-container" class="about-content">
      <div id="about-skeleton">
        <div class="skeleton" style="height:300px;"></div>

    </div>
  </footer>

  <script src="../../assets/js/main.js?v=1772545699"></script>
  <script>
    const { $ } = SahilNotes;

    async function loadAbout() {
      try {
        const response = await fetch('../../assets/about-ja.json');
        const data = await response.json();
        const container = $('#about-container');

        if (data && data.coverImage && data.text) {
          container.innerHTML = `
            <img src="../../${data.coverImage}" alt="プロフィール" class="about-cover" loading="lazy">
            <div class="about-body fade-in">
              ${data.text}
            </div>
          `;
        } else {
          container.innerHTML = '<p class="text-muted text-center" style="padding:2rem;">プロフィール情報を取得できません。</p>';
        }
      } catch (error) {
        console.error('Error loading about:', error);
        $('#about-container').innerHTML = '<p class="text-muted text-center" style="padding:2rem;">プロフィールページの読み込みに失敗しました。</p>';
      }
    }

    loadAbout();
  </script>
</body>
</html>
