  <!-- Main Content -->
  <main class="container py-4">
    <h1 class="text-center mb-3" id="gallery-title">フォトギャラリー</h1>
    <p class="text-center text-muted mb-2">サヒル・ディウェディ（Sahil Dwivedi）の写真コレクション</p>

    <!-- Search Box -->
    <div class="search-box gallery-search">
      <span class="search-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </span>
      <input type="text" id="gallery-search" class="search-input" placeholder="写真を検索..." autocomplete="off">
    </div>
    <p id="search-results-count" class="search-results-count hidden"></p>

    <div id="gallery" class="gallery-grid"></div>

    </div>
  </footer>

  <script src="../../assets/js/main.js?v=1772540600"></script>
  <script>
    const { $, Skeleton, Lightbox, debounce } = SahilNotes;

    let allImages = [];
    let filteredImages = [];
    let displayedCount = 0;
    const batchSize = 24;
    const container = $('#gallery');
    const loading = $('#loading');
    const searchInput = $('#gallery-search');
    const resultsCount = $('#search-results-count');

    container.innerHTML = Skeleton.galleryGrid(batchSize);

    async function loadGallery() {
      try {
        const response = await fetch('../../assets/images-ja.json');
        allImages = await response.json();
        filteredImages = allImages;

        Lightbox.setImages(allImages.map(img => ({ url: '../../' + img.url, title: img.title })));

        displayedCount = 0;
        container.innerHTML = '';
        loadMoreImages();
        setupInfiniteScroll();
        setupSearch();
      } catch (error) {
        console.error('Error loading gallery:', error);
        container.innerHTML = '<p class="text-muted text-center">ギャラリーを読み込めませんでした。</p>';
      }
    }

    function renderImage(img, index) {
      const item = document.createElement('div');
      item.className = 'gallery-item fade-in';
      item.onclick = () => SahilNotes.Lightbox.open('../../' + img.url, img.title, index);
      item.innerHTML = `
        <img src="../../${img.url}" alt="${img.title}" loading="lazy" class="loading" onload="this.classList.remove('loading');this.classList.add('loaded');">
        <div class="gallery-item-overlay">${img.title}</div>
      `;
      return item;
    }

    function loadMoreImages() {
      if (displayedCount >= filteredImages.length) {
        loading.classList.add('hidden');
        return;
      }

      loading.classList.remove('hidden');

      const nextBatch = filteredImages.slice(displayedCount, displayedCount + batchSize);

      nextBatch.forEach((img, i) => {
        const index = displayedCount + i;
        container.appendChild(renderImage(img, index));
      });

      displayedCount += nextBatch.length;
      loading.classList.add('hidden');
    }

    function searchImages(query) {
      const q = query.toLowerCase().trim();
      displayedCount = 0;
      container.innerHTML = '';

      if (!q) {
        filteredImages = allImages;
        resultsCount.classList.add('hidden');
        Lightbox.setImages(allImages.map(img => ({ url: '../../' + img.url, title: img.title })));
      } else {
        filteredImages = allImages.filter(img =>
          img.title.toLowerCase().includes(q) ||
          (img.date && img.date.toLowerCase().includes(q))
        );
        resultsCount.textContent = `${filteredImages.length}枚の写真が見つかりました`;
        resultsCount.classList.remove('hidden');
        Lightbox.setImages(filteredImages.map(img => ({ url: '../../' + img.url, title: img.title })));
      }

      if (filteredImages.length === 0) {
        container.innerHTML = '<div class="no-results"><p>検索条件に一致する写真がありません。</p></div>';
      } else {
        loadMoreImages();
      }
    }

    function setupSearch() {
      const debouncedSearch = debounce(searchImages, 200);
      searchInput.addEventListener('input', (e) => debouncedSearch(e.target.value));
    }

    function setupInfiniteScroll() {
      window.addEventListener('scroll', () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
          loadMoreImages();
        }
      });
    }

    loadGallery();
  </script>
</body>
</html>
